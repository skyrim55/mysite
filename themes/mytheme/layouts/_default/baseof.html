<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Summary }}{{ end }}"/>
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/main.css"/>
  {{ block "head" . }}{{ end }}
</head>
<body>

  {{- if not .IsHome }}
    {{ partial "header.html" . }}
  {{- end }}

  <main id="main">
    {{ block "main" . }}{{ end }}
  </main>

  {{- if not .IsHome }}
    {{ partial "footer.html" . }}
  {{- end }}

  <script src="/js/main.js"></script>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
