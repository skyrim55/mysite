<header class="site-header">
  <div class="container">
    <a href="/" class="logo">
      <span class="logo-icon">&#128293;</span>
      <span class="logo-text">Skyrim</span>
    </a>
    <nav class="site-nav" id="siteNav">
      <ul>
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active"{{ end }}>{{ .Name }}</a>
        </li>
        {{ end }}
      </ul>
    </nav>
    <button class="nav-toggle" onclick="document.getElementById('siteNav').classList.toggle('open')" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
